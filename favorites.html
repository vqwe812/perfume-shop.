<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Любимое | PerfumeShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
/* === БАЗОВЫЕ ПЕРЕМЕННЫЕ (Светлая тема) === */
:root {
    --bg-body: linear-gradient(135deg, #f5f7f0 0%, #e8f5e9 50%, #fff8e1 100%);
    --bg-card: #ffffff;
    --bg-header: rgba(255, 255, 255, 0.95);
    --bg-input: #fafbfc;
    --text-main: #4a4a4a;
    --text-muted: #666666;
    --border-color: #e8f5e9;
    --shadow-color: rgba(0, 0, 0, 0.05);
    --hero-bg: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 50%, #fff8e1 100%);
    --footer-bg: #2c2c2c;
    --footer-text: #aaaaaa;
}

/* === ТЁМНАЯ ТЕМА === */
[data-theme="dark"] {
    --bg-body: linear-gradient(135deg, #1a1f1a 0%, #232b23 50%, #2a3025 100%);
    --bg-card: #252d25;
    --bg-header: rgba(30, 35, 30, 0.95);
    --bg-input: #2d352d;
    --text-main: #e8f5e9;
    --text-muted: #a8b5a8;
    --border-color: #3a453a;
    --shadow-color: rgba(0, 0, 0, 0.3);
    --hero-bg: linear-gradient(135deg, #1e2b1e 0%, #253325 50%, #2a3025 100%);
    --footer-bg: #151915;
    --footer-text: #8a958a;
}

/* Применение переменных */
body {
    background: var(--bg-body);
    color: var(--text-main);
    background-attachment: fixed;
}

header { background: var(--bg-header); }
.product-card, .cart-summary, .checkout-form-section, .checkout-summary-section, .modal-content { 
    background: var(--bg-card); 
    box-shadow: 0 5px 20px var(--shadow-color);
}
input, select, textarea { background: var(--bg-input); border-color: var(--border-color); color: var(--text-main); }
.hero { background: var(--hero-bg); }
footer { background: var(--footer-bg); color: var(--footer-text); }
.nav a { color: var(--text-main); }
.product-meta, .page-header p, .cart-item-meta { color: var(--text-muted); }

/* Стили кнопки темы */
.theme-toggle {
    background: transparent;
    border: 2px solid var(--border-color);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    transition: all 0.3s;
    flex-shrink: 0;
}
.theme-toggle:hover {
    background: var(--bg-card);
    border-color: #97bc62;
    transform: scale(1.05);
}
.icon-dark { display: none; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #f5f7f0 0%, #e8f5e9 50%, #fff8e1 100%);
            background-attachment: fixed;
            color: #4a4a4a;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .page-header { text-align: center; padding: 60px 0 40px; }
        .page-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 48px; color: #2c5f2d; margin-bottom: 10px; }
        .page-header p { color: #666; }

        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
            padding: 20px 0 80px;
        }
        .fav-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s;
            position: relative;
        }
        .fav-card:hover { transform: translateY(-5px); }
        .fav-card-img {
            width: 100%;
            height: 250px;
            background: #f8f9fa;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .fav-card-img img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .fav-brand { font-size: 12px; color: #97bc62; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .fav-name { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: #333; margin-bottom: 10px; }
        .fav-price { font-size: 28px; color: #2c5f2d; font-weight: 600; margin-bottom: 20px; }
        .remove-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #e74c3c;
            border: 2px solid #e74c3c;
            border-radius: 25px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }
        .remove-btn:hover { background: #e74c3c; color: white; }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #888;
            font-size: 18px;
            grid-column: 1 / -1;
        }
        .empty-state span { font-size: 50px; display: block; margin-bottom: 15px; }
        .empty-state a { color: #2c5f2d; text-decoration: none; border-bottom: 1px solid; }

        footer { background: #2c2c2c; color: #aaa; padding: 40px 0 20px; margin-top: 60px; }
        .footer-bottom { text-align: center; padding-top: 20px; border-top: 1px solid #444; font-size: 12px; }

        @media (max-width: 768px) {
            .favorites-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <div class="logo-icon">🌸</div>
                    PerfumeShop
                </a>
                <nav>
                    <ul>
                        <li><button id="themeToggle" class="theme-toggle"><span class="icon-light">☀️</span><span class="icon-dark">🌙</span></button></li>
                        <li><a href="index.html">Главная</a></li>
                        <li><a href="catalog.html">Каталог</a></li>
                        <li><a href="about.html">О магазине</a></li>
                        <li><a href="favorites.html" style="color:#2c5f2d; font-weight:600;">Любимое <span id="favCount">(0)</span></a></li>
                        <li><a href="cart.html" class="cart-btn">🛒 Корзина <span id="cartCount">(0)</span></a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <h1>Ваше избранное</h1>
            <p>Ароматы, которые вы отложили для себя</p>
        </div>

        <div class="favorites-grid" id="favoritesGrid">
            <!-- Товары будут добавлены через JavaScript -->
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 PerfumeShop. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <script>
        const favoritesGrid = document.getElementById('favoritesGrid');

        // Функция отображения избранного
        function renderFavorites() {
            const favorites = JSON.parse(localStorage.getItem('ps_favorites')) || [];
            
            if (favorites.length === 0) {
                favoritesGrid.innerHTML = `
                    <div class="empty-state">
                        <span>💔</span>
                        В избранном пока пусто.<br>
                        <a href="catalog.html">Перейти в каталог</a>, чтобы добавить товары
                    </div>
                `;
                return;
            }

            favoritesGrid.innerHTML = '';
            
            favorites.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'fav-card';
                card.innerHTML = `
                    <div class="fav-card-img">
                        <img src="${item.image}" alt="${item.name}">
                    </div>
                    <div class="fav-brand">${item.brand}</div>
                    <h3 class="fav-name">${item.name}</h3>
                    <div class="fav-price">${item.price} BYN</div>
                    <button class="remove-btn" onclick="removeFromFavorites(${index})">Убрать из избранного</button>
                `;
                favoritesGrid.appendChild(card);
            });
        }

        // Функция удаления из избранного
        function removeFromFavorites(index) {
            const favorites = JSON.parse(localStorage.getItem('ps_favorites')) || [];
            favorites.splice(index, 1);
            localStorage.setItem('ps_favorites', JSON.stringify(favorites));
            renderFavorites();
            updateFavCount();
        }

        // Обновление счетчика
        function updateFavCount() {
            const favorites = JSON.parse(localStorage.getItem('ps_favorites')) || [];
            const countElement = document.querySelector('a[href="favorites.html"] span');
            if (countElement) {
                countElement.textContent = `(${favorites.length})`;
            }
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('ps_cart')) || [];
            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartCount').textContent = '(' + totalItems + ')';
        }

        updateCartCount();

        // Инициализация
        renderFavorites();
        updateFavCount();
    </script>
<script>
    // 1. Получаем элементы DOM
    const themeToggle = document.getElementById('themeToggle');
    const htmlElement = document.documentElement;
    const iconLight = themeToggle.querySelector('.icon-light');
    const iconDark = themeToggle.querySelector('.icon-dark');

    // 2. Проверяем сохранённую тему в localStorage
    const savedTheme = localStorage.getItem('theme') || 'light';
    
    // Применяем тему при загрузке
    function applyTheme(theme) {
        // Изменяем атрибут data-theme у корневого элемента
        htmlElement.setAttribute('data-theme', theme);
        
        // Меняем иконку через display (манипуляция DOM-свойствами)
        if (theme === 'dark') {
            iconLight.style.display = 'none';
            iconDark.style.display = 'inline';
        } else {
            iconLight.style.display = 'inline';
            iconDark.style.display = 'none';
        }

        // Изменяем фоновые изображения/градиенты, если не подходят под тему
        updateBackgrounds(theme);
    }

    // Функция смены фонов (требование задания)
    function updateBackgrounds(theme) {
        const heroSection = document.querySelector('.hero');
        const advantagesSection = document.querySelector('.advantages');
        
        if (heroSection) {
            if (theme === 'dark') {
                // Тёмный градиент для Hero
                heroSection.style.background = 'linear-gradient(135deg, #1e2b1e 0%, #253325 50%, #2a3025 100%)';
            } else {
                // Светлый градиент по умолчанию
                heroSection.style.background = 'linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 50%, #fff8e1 100%)';
            }
        }

        if (advantagesSection) {
            if (theme === 'dark') {
                advantagesSection.style.background = 'linear-gradient(135deg, rgba(30, 43, 30, 0.6), rgba(42, 48, 37, 0.6))';
            } else {
                advantagesSection.style.background = 'linear-gradient(135deg, rgba(232, 245, 233, 0.5), rgba(255, 248, 225, 0.5))';
            }
        }
    }

    // 3. Назначаем обработчик события клика
    themeToggle.addEventListener('click', () => {
        const currentTheme = htmlElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        // Сохраняем выбор пользователя
        localStorage.setItem('theme', newTheme);
        
        // Применяем изменения
        applyTheme(newTheme);
    });

    // Инициализация при загрузке страницы
    applyTheme(savedTheme);
</script>
</body>
</html>
